# docker-compose.yml
# מתזמר שני קונטיינרים יחד: האפליקציה + מסד הנתונים
# פקודה אחת מרימה את שניהם: docker-compose up

services:

  # ---- שירות ראשון: האפליקציה שלנו ----
  app:
    build: .                 # בונה את האימג' מה-Dockerfile בתיקייה הזו
    ports:
      - "8080:3000"          # פורט 8080 במחשב -> 3000 בתוך הקונטיינר
    environment:
      # כתובת מסד הנתונים. שם המארח "mongo" הוא שם השירות למטה -
      # docker-compose מחבר ביניהם אוטומטית ברשת פנימית.
      - MONGO_URI=mongodb://mongo:27017/users-management
    depends_on:
      - mongo                # מחכה שהמסד יעלה קודם

  # ---- שירות שני: מסד הנתונים MongoDB ----
  mongo:
    image: mongo:7           # אימג' רשמי מוכן של MongoDB - לא בונים, רק מורידים
    ports:
      - "27017:27017"        # פורט ברירת המחדל של מונגו
    volumes:
      - mongo-data:/data/db  # שומר את הנתונים גם אחרי שהקונטיינר נמחק

# ---- אחסון קבוע לנתונים של מונגו ----
volumes:
  mongo-data:
